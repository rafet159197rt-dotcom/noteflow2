name: Build NoteFlow APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # Manuel tetikleme butonu

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Capacitor Init & Add Android
        run: |
          npx cap init NoteFlow com.noteflow.app --web-dir www
          npx cap add android

      - name: Sync web assets to Android
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NoteFlow-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: APK Build Summary
        run: |
          APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            SIZE=$(du -sh "$APK_PATH" | cut -f1)
            echo "✅ APK başarıyla oluşturuldu!"
            echo "📦 Boyut: $SIZE"
            echo "📍 Konum: $APK_PATH"
          else
            echo "❌ APK oluşturulamadı"
            exit 1
          fi
